let sortCol = 1, sortAsc = false, filtered = [];

function init() {
  document.getElementById('fetchDate').textContent = new Date().toLocaleDateString('sv-SE');
  const years = [...new Set(DATA.map(r => r.date.substring(0,4)))].sort().reverse();
  const sel = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; sel.appendChild(o); });
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const yr = document.getElementById('yearFilter').value;
  filtered = DATA.filter(r =>
    (!q || r.dno.toLowerCase().includes(q) || r.date.includes(q) || r.subject.toLowerCase().includes(q)) &&
    (!yr || r.date.startsWith(yr))
  );
  sortAndRender();
}

function sortTable(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  ['arr0','arr1','arr2'].forEach((id,i) => document.getElementById(id).textContent = i===col ? (sortAsc?'↑':'↓') : '↕');
  sortAndRender();
}

function sortAndRender() {
  const keys = ['dno','date','subject'];
  const k = keys[sortCol];
  filtered.sort((a,b) => {
    const r = a[k].localeCompare(b[k], 'sv');
    return sortAsc ? r : -r;
  });
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(r =>
    `<tr><td class="dno">${esc(r.dno)}</td><td class="date">${esc(r.date)}</td><td class="subject">${esc(r.subject)}</td></tr>`
  ).join('');
  document.getElementById('stats').textContent = `Visar ${filtered.length} av ${DATA.length} ärenden`;
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
